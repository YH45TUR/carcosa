# Sistema Legal CO - Docker Compose Producción
# ==============================================
# Uso: docker compose -f docker-compose.production.yml up -d

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=legal_user
      - POSTGRES_PASSWORD=legal_pass
      - POSTGRES_DB=sistema_legal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal_user -d sistema_legal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI (producción)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    environment:
      - DATABASE_URL=postgresql://legal_user:legal_pass@db:5432/sistema_legal
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET es requerido}
      - DEBUG=false
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    # Comando con migración automática al iniciar
    command: >
      sh -c "alembic upgrade head &&
             gunicorn app.main:app
             --worker-class uvicorn.workers.UvicornWorker
             --bind 0.0.0.0:8000
             --workers 4
             --timeout 120
             --access-logfile -
             --error-logfile -"

  # Frontend React (producción con Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
      args:
        - VITE_API_URL=/api
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_data:
