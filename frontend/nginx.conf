# Sistema Legal CO - Nginx Config for Production

# Redireccion HTTP -> HTTPS (descomentar en produccion con SSL)
# server {
#     listen 80;
#     server_name tudominio.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;

    # Raiz con el build de React
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # ============================================
    # HEADERS DE SEGURIDAD
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy - restringe origenes de scripts, estilos, etc.
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob:;
        font-src 'self' data:;
        connect-src 'self' http://localhost:8000 ws://localhost:8000;
        frame-ancestors 'none';
        form-action 'self';
        base-uri 'self';
    " always;

    # HTTP Strict Transport Security (descomentar cuando HTTPS este configurado)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # SPA: todas las rutas al index.html
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Assets estaticos con cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy inverso al backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # WebSocket para chat
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Healthcheck
    location /health {
        access_log off;
        return 200 "OK";
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
